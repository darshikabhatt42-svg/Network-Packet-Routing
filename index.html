<!DOCTYPE html>
<html>
<head>
    <title>Network Packet Routing</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 60%;
            margin: auto;
            margin-top: 40px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
        }

        .section {
            margin: 20px 0;
        }

        input {
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #667eea;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #5a67d8;
        }

        #output {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .title {
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="container">

<h1>📡 Network Packet Routing System</h1>

<div class="section">
    <div class="title">🔹 Network Setup</div>

    Nodes:
    <input type="number" id="nodes">

    <br>

    Edge (u v weight):
    <input type="text" id="edge">
    <button onclick="addEdge()">Add Edge</button>
</div>

<div class="section">
    <div class="title">🔹 Routing</div>

    Source:
    <input type="number" id="src">

    Destination:
    <input type="number" id="dest">

    <br><br>

    <button onclick="runDijkstra()">Find Shortest Path</button>
</div>

<div id="output"></div>

</div>

<script>
let graph = [];
let edges = [];

function addEdge() {
    let input = document.getElementById("edge").value.split(" ");
    let u = parseInt(input[0]);
    let v = parseInt(input[1]);
    let w = parseInt(input[2]);

    edges.push({u, v, w});
    alert("Edge added!");
}

function buildGraph(n) {
    graph = Array.from({length: n}, () => Array(n).fill(0));

    edges.forEach(e => {
        graph[e.u][e.v] = e.w;
        graph[e.v][e.u] = e.w;
    });
}

function runDijkstra() {
    let n = parseInt(document.getElementById("nodes").value);
    let src = parseInt(document.getElementById("src").value);
    let dest = parseInt(document.getElementById("dest").value);

    buildGraph(n);

    let dist = Array(n).fill(Infinity);
    let visited = Array(n).fill(false);
    let parent = Array(n).fill(-1);

    dist[src] = 0;

    for (let i = 0; i < n - 1; i++) {
        let u = minDistance(dist, visited);
        visited[u] = true;

        for (let v = 0; v < n; v++) {
            if (!visited[v] && graph[u][v] !== 0 &&
                dist[u] + graph[u][v] < dist[v]) {

                dist[v] = dist[u] + graph[u][v];
                parent[v] = u;
            }
        }
    }

    displayResult(parent, dest, dist[dest]);
}

function minDistance(dist, visited) {
    let min = Infinity, index = -1;

    for (let i = 0; i < dist.length; i++) {
        if (!visited[i] && dist[i] < min) {
            min = dist[i];
            index = i;
        }
    }

    return index;
}

function displayResult(parent, dest, cost) {
    let path = [];
    let temp = dest;

    while (temp !== -1) {
        path.push(temp);
        temp = parent[temp];
    }

    path.reverse();

    let hops = path.length - 1;

    let output = `
        <div class="title">📊 Result</div>
        🚀 <b>Path:</b> ${path.join(" → ")} <br>
        💰 <b>Cost:</b> ${cost} <br>
        🔁 <b>Hops:</b> ${hops} <br><br>

        <div class="title">📦 Packet Flow</div>
    `;

    path.forEach(node => {
        output += `➡️ Packet at Router ${node}<br>`;
    });

    document.getElementById("output").innerHTML = output;
}
</script>

</body>
</html>
